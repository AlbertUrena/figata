[[redirects]]
  from = "/menu/:item"
  to = "/menu/index.html"
  status = 200

[[redirects]]
  from = "/menu/:item/"
  to = "/menu/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

