<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Figata CMS Archivado</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #101214;
        color: #f4efe8;
      }

      main {
        width: min(680px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        background: rgba(20, 23, 27, 0.96);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0 0 14px;
        line-height: 1.6;
        color: rgba(244, 239, 232, 0.82);
      }

      a {
        color: #f6b36e;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CMS archivado</h1>
      <p>
        El flujo basado en Netlify CMS ya no es la ruta soportada para Figata.
      </p>
      <p>
        El Admin activo vive en <a href="/admin/app/">/admin/app/</a> y el backend soportado corre en Cloudflare.
      </p>
      <p>
        Si llegaste aqui desde una guia vieja, usa la documentacion actual del publish pipeline y del Admin panel.
      </p>
    </main>
  </body>
</html>
