            required: false
          - label: WhatsApp URL
            name: whatsapp
            widget: string
            required: false
          - label: Reservation URL
            name: reservationUrl
            widget: string
            required: false
          - label: Google Maps URL
            name: googleMapsUrl
            widget: string
