              - label: Description
                name: description
                widget: text
                required: false
              - label: URL
                name: url
                widget: string
                required: false
              - label: Image
                name: image
                widget: string
                required: false
  - name: media
    label: Media
    files:
      - label: Media JSON (Raw)
        name: media_data
        file: data/media.json
        fields:
          - label: Raw JSON
            name: body
            widget: code
            default_language: json
            output_code_only: true
            hint: "Edita el JSON completo de media.json aqui."
