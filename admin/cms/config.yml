              - label: City
                name: city
                widget: string
              - label: Area
                name: area
                widget: string
                required: false
              - label: Country
                name: country
                widget: string
              - label: Postal Code
                name: postalCode
                widget: string
                required: false
          - label: Opening Hours
            name: openingHours
            widget: object
            fields:
              - label: Monday
                name: mon
